[workspace]
name = "hextraj"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.10,<3.13"
numpy = "*"
pyproj = "*"
xarray = "*"
geopandas = "*"
shapely = "*"
netcdf4 = ">=1.7.4,<2"

[pypi-dependencies]
hextraj = { path = ".", editable = true }

[feature.full.dependencies]
dask = "*"
scipy = "*"
cartopy = "*"
zarr = "<3"

[feature.dev.dependencies]
pytest = "*"
pytest-cov = "*"
jupyter = "*"
nbconvert = "*"
mypy = "*"
pooch = "*"

[feature.dev.tasks]
test = "pytest --cov --cov-report=term-missing"
mypy = "mypy src/hextraj/"
fetch-external = "python scripts/fetch_external_data.py"

[environments]
default = { features = ["full", "dev"], solve-group = "default" }
minimal = { features = [], solve-group = "minimal" }
